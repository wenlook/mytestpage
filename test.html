<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive Hosting Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f7f6;
            margin: 0;
            padding: 50px 20px;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: inline-block;
            max-width: 400px;
        }
        h1 {
            color: #2c3e50;
        }
        p {
            color: #7f8c8d;
            font-size: 16px;
        }
        .btn {
            background-color: #27ae60;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        .btn:hover {
            background-color: #219653;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎉 Success!</h1>
        <p>Your HTML file is officially live on the internet using Google Drive and DriveToWeb.</p>
        <button class="btn" onclick="alert('JavaScript is working perfectly too!')">Click to Test Page</button>
    </div>

</body>
</html>
